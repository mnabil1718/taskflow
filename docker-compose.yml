services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-test:
    profiles: ["test"]
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: taskflow_test
      POSTGRES_PASSWORD: taskflow_test
      POSTGRES_DB: taskflow_test
    ports:
      - "5434:5432"
    tmpfs:
      - /var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      APP_PORT: "8080"
      APP_ENV: production
      MIGRATIONS_PATH: migrations
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: taskflow
      DB_PASSWORD: taskflow
      DB_NAME: taskflow
      DB_SSLMODE: disable
      JWT_ACCESS_SECRET: 8daaebfc5019945ff6eeab47b7d6a149f199c1930a0e65297195bf6d055c0a6d
      JWT_REFRESH_SECRET: 0cb4e45f6ae61807e9de523192cb40c3eb328945b65cc1d7f6e105e5761813a0
      JWT_ACCESS_EXPIRY: "15m"
      JWT_REFRESH_EXPIRY: "168h"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8080/api/v1"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
