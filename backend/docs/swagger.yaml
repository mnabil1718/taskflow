basePath: /api/v1
definitions:
  handler.ProjectPage:
    properties:
      items: {}
      limit:
        example: 10
        type: integer
      page:
        example: 1
        type: integer
      total:
        example: 42
        type: integer
      total_pages:
        example: 5
        type: integer
    type: object
  handler.TaskPage:
    properties:
      items: {}
      limit:
        example: 10
        type: integer
      page:
        example: 1
        type: integer
      total:
        example: 42
        type: integer
      total_pages:
        example: 5
        type: integer
    type: object
  model.AddMemberRequest:
    properties:
      role:
        allOf:
        - $ref: '#/definitions/model.ProjectRole'
        example: member
      user_id:
        example: c303012a-6275-4aa3-adec-ebfb123f4567
        type: string
    type: object
  model.AssignTaskRequest:
    properties:
      assignee_id:
        example: f02c1d9c-1f73-4d3a-9b8c-aab0cf2d12cd
        type: string
    type: object
  model.BoardView:
    properties:
      done:
        items:
          $ref: '#/definitions/model.Task'
        type: array
      in_progress:
        items:
          $ref: '#/definitions/model.Task'
        type: array
      todo:
        items:
          $ref: '#/definitions/model.Task'
        type: array
    type: object
  model.CreateProjectRequest:
    properties:
      deadline:
        example: "2026-12-31T23:59:59Z"
        type: string
      description:
        example: All tasks for Q4 planning
        type: string
      name:
        example: Q4 Roadmap
        type: string
    type: object
  model.CreateTaskRequest:
    properties:
      assignee_id:
        example: f02c1d9c-1f73-4d3a-9b8c-aab0cf2d12cd
        type: string
      description:
        example: Plug JWTProtected into the v1 router
        type: string
      due_date:
        example: "2026-06-01T17:00:00Z"
        type: string
      position:
        description: |-
          Optional Lexorank position. Send one only when creating from the Kanban
          board and you need exact placement; the data-table create flow can omit
          it and the server will default to end-of-column.
        example: "00009000"
        type: string
      priority:
        allOf:
        - $ref: '#/definitions/model.TaskPriority'
        example: high
      title:
        example: Wire up auth middleware
        type: string
    type: object
  model.LoginRequest:
    properties:
      email:
        example: alice@example.com
        type: string
      password:
        example: password123
        type: string
    type: object
  model.MoveTaskRequest:
    properties:
      position:
        example: 0000h000
        type: string
      status:
        allOf:
        - $ref: '#/definitions/model.TaskStatus'
        example: in_progress
    type: object
  model.Project:
    properties:
      created_at:
        type: string
      deadline:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      owner_id:
