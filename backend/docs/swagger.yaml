    x-enum-varnames:
    - ProjectRoleOwner
    - ProjectRoleAdmin
    - ProjectRoleMember
  model.ProjectStatus:
    enum:
    - active
    - archived
    type: string
    x-enum-varnames:
    - ProjectStatusActive
    - ProjectStatusArchived
  model.ProjectTaskCounts:
    properties:
      done:
        example: 12
        type: integer
      in_progress:
        example: 3
        type: integer
      project_id:
        example: c303012a-6275-4aa3-adec-ebfb123f4567
        type: string
      project_name:
        example: Q4 Roadmap
        type: string
      todo:
        example: 5
        type: integer
      total:
        example: 20
        type: integer
    type: object
  model.RefreshRequest:
    properties:
      refresh_token:
        example: k9F2pQ7sR1tU4vWxYz0AbCdEfGhIjKlMnOpQrStUvWx=
        type: string
    type: object
  model.RegisterRequest:
    properties:
      email:
        example: alice@example.com
        type: string
      name:
        example: Alice
        type: string
      password:
        example: password123
        type: string
    type: object
  model.Task:
    properties:
      assignee_email:
        example: jane@example.com
        type: string
      assignee_id:
        example: f02c1d9c-1f73-4d3a-9b8c-aab0cf2d12cd
        type: string
      assignee_name:
        example: Jane Doe
        type: string
      created_at:
        example: "2026-05-20T09:15:00Z"
        type: string
      created_by:
        example: 6b3a0c0e-2cc1-4f3c-8d9c-1a1b2c3d4e5f
        type: string
      description:
        example: Plug JWTProtected into the v1 router
        type: string
      due_date:
        example: "2026-06-01T17:00:00Z"
        type: string
      id:
        example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        type: string
      position:
        example: "00001000"
        type: string
      priority:
        allOf:
        - $ref: '#/definitions/model.TaskPriority'
        example: medium
      project_id:
        example: c303012a-6275-4aa3-adec-ebfb123f4567
        type: string
      status:
        allOf:
        - $ref: '#/definitions/model.TaskStatus'
        example: todo
      title:
        example: Wire up auth middleware
        type: string
      updated_at:
        example: "2026-05-20T09:15:00Z"
        type: string
    type: object
  model.TaskActivityLog:
    properties:
      changed_by:
        example: 6b3a0c0e-2cc1-4f3c-8d9c-1a1b2c3d4e5f
        type: string
      changed_by_name:
        example: Jane Doe
        type: string
      created_at:
        example: "2026-05-20T10:00:00Z"
        type: string
      from_status:
        allOf:
        - $ref: '#/definitions/model.TaskStatus'
        example: todo
      id:
        example: 5b5a7c2c-1d3e-4d3a-9b8c-aab0cf2d99aa
        type: string
      task_id:
        example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        type: string
      to_status:
        allOf:
        - $ref: '#/definitions/model.TaskStatus'
        example: in_progress
    type: object
  model.TaskActivityLogPage:
    properties:
      has_more:
        example: true
        type: boolean
      items:
        items:
          $ref: '#/definitions/model.TaskActivityLog'
        type: array
    type: object
  model.TaskPriority:
    enum:
    - low
    - medium
    - high
    type: string
    x-enum-varnames:
    - TaskPriorityLow
    - TaskPriorityMedium
    - TaskPriorityHigh
  model.TaskStatus:
    enum:
    - todo
    - in_progress
    - done
    type: string
    x-enum-varnames:
    - TaskStatusTodo
    - TaskStatusInProgress
    - TaskStatusDone
  model.TokenPair:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyX2lkIjoiYzMwMzAxMmEtNjI3NS00YWEzLWFkZWMtZWJmYjEyM2Y0NTY3IiwiZW1haWwiOiJhbGljZUBleGFtcGxlLmNvbSIsImV4cCI6MTczMzc4NzIwMH0.signature
        type: string
      refresh_token:
        example: k9F2pQ7sR1tU4vWxYz0AbCdEfGhIjKlMnOpQrStUvWx=
        type: string
    type: object
  model.TrashItem:
    properties:
      deleted_at:
        example: "2026-05-23T09:15:00Z"
        type: string
      id:
        example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        type: string
      kind:
        allOf:
        - $ref: '#/definitions/model.TrashKind'
        example: task
      project_id:
        example: c303012a-6275-4aa3-adec-ebfb123f4567
        type: string
      project_name:
        example: Auth rework
        type: string
      task_count:
        example: 5
        type: integer
      title:
        example: Wire up auth middleware
        type: string
    type: object
  model.TrashKind:
    enum:
    - project
    - task
    type: string
    x-enum-varnames:
    - TrashKindProject
    - TrashKindTask
  model.UpcomingTask:
    properties:
      due_date:
        example: "2026-05-22T17:00:00Z"
        type: string
      id:
        example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        type: string
      priority:
        allOf:
        - $ref: '#/definitions/model.TaskPriority'
        example: high
      project_id:
        example: c303012a-6275-4aa3-adec-ebfb123f4567
        type: string
      project_name:
        example: Q4 Roadmap
        type: string
      status:
        allOf:
        - $ref: '#/definitions/model.TaskStatus'
        example: in_progress
      title:
        example: Ship release candidate
        type: string
    type: object
  model.UpdateProjectRequest:
    properties:
      deadline:
        example: "2026-12-31T23:59:59Z"
        type: string
      description:
        example: Updated scope for Q4
        type: string
      name:
        example: Q4 Roadmap (revised)
        type: string
      status:
        allOf:
        - $ref: '#/definitions/model.ProjectStatus'
        example: archived
    type: object
  model.UpdateTaskRequest:
    properties:
      assignee_id:
        example: f02c1d9c-1f73-4d3a-9b8c-aab0cf2d12cd
        type: string
      description:
        example: Also cover refresh-token flow
        type: string
      due_date:
        example: "2026-06-05T17:00:00Z"
        type: string
      priority:
        allOf:
        - $ref: '#/definitions/model.TaskPriority'
        example: high
      status:
        allOf:
        - $ref: '#/definitions/model.TaskStatus'
        example: in_progress
      title:
        example: Wire up auth middleware (revised)
        type: string
    type: object
  model.UpdateTaskStatusRequest:
    properties:
      status:
        allOf:
        - $ref: '#/definitions/model.TaskStatus'
        example: in_progress
    type: object
  model.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  response.Body:
    properties:
      data:
        type: object
      error:
        example: 'validation error: password must be at least 8 characters'
        type: string
      message:
        example: operation successful
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: TaskFlow Maintainers
    url: https://github.com/mnabil1718/taskflow
  description: |-
    Task management REST API with JWT authentication.
    All responses follow the shape { data, message, error }.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: TaskFlow API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns an access/refresh token pair.
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.TokenPair'
              type: object
        "400":
          description: Missing fields or malformed JSON body
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Invalid email or password
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      summary: Log in with email and password
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: |-
        Invalidates the supplied refresh token. Idempotent: returns 200
        even if the token does not exist.
      parameters:
      - description: Refresh token to invalidate
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Logged out successfully
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Missing refresh_token or malformed JSON body
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      summary: Log out the current session
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: |-
        Rotates the refresh token: the supplied token is deleted and a
        new access/refresh pair is issued.
      parameters:
      - description: Current refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Token refreshed
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.TokenPair'
              type: object
        "400":
          description: Missing refresh_token or malformed JSON body
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Invalid or expired refresh token
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      summary: Exchange a refresh token for a new token pair
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: |-
        Creates a new user account and returns an access/refresh token pair.
        Validation rules: name >= 2 chars, valid email, password >= 8 chars.
      parameters:
      - description: Registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Registration successful
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.TokenPair'
              type: object
        "400":
          description: Validation error or malformed JSON body
          schema:
            $ref: '#/definitions/response.Body'
        "409":
          description: Email already registered
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      summary: Register a new user
      tags:
      - auth
  /dashboard/project-task-counts:
    get:
      description: |-
        Returns a count of tasks grouped by status (todo, in_progress, done) for every
        project the caller is a member of, plus the total task count per project.
        Projects with no tasks are still included with zeroed counters.
      produces:
      - application/json
      responses:
        "200":
          description: Project task counts retrieved
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.ProjectTaskCounts'
                  type: array
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Per-project task counts
      tags:
      - dashboard
  /dashboard/upcoming-tasks:
    get:
      description: |-
        Returns tasks assigned to the caller whose due_date falls within the next 3 days
        and whose status is not "done". Ordered by soonest due_date first.
      produces:
      - application/json
      responses:
        "200":
          description: Upcoming tasks retrieved
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.UpcomingTask'
                  type: array
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Upcoming tasks assigned to the caller
      tags:
      - dashboard
  /notifications:
    get:
      description: |-
        Returns the caller's most-recent notifications (newest first) plus the
        count of unread ones for the bell badge. Notifications are created only
        for: a task assigned to the caller, and task/project deadline reminders
        (3 days then 1 day before the deadline).
      parameters:
      - description: Max items to return (default 50, max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Notifications retrieved
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.NotificationPage'
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: List the caller's notifications
      tags:
      - notifications
  /notifications/{id}/read:
    post:
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Notification marked read
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Mark one notification as read
      tags:
      - notifications
  /notifications/read-all:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: Notifications marked read
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Mark all the caller's notifications as read
      tags:
      - notifications
  /notifications/stream:
    get:
      description: |-
        Opens a long-lived SSE connection that pushes the caller's notifications
        live as they are created. Each pushed item is the same model.Notification
        shape as the list endpoint (matched by id), so a client merges live items
        into the fetched list without duplicates.

        Notification types:
        - task.assigned             — a task was assigned to the caller
        - task.deadline_reminder    — a task assigned to the caller is approaching its due date
        - project.deadline_reminder — a project the caller is a member of is approaching its deadline

        Deadline reminders fire in two windows (3 days then 1 day before); the
        `reminder_window` field is "3d" or "1d" accordingly.

        Wire format: text/event-stream. Each event arrives as two lines followed
        by a blank line:
        event: <type>
        data:  <json-encoded model.Notification>

        A `: ping` comment is sent every 15 seconds to keep the connection alive.
      produces:
      - text/event-stream
      responses:
        "200":
          description: 'JSON payload carried in each event''s data: line'
          schema:
            $ref: '#/definitions/model.Notification'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Stream notifications (Server-Sent Events)
      tags:
      - notifications
  /projects:
    get:
      description: Returns a paginated list of projects the caller owns or is a member
        of.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page, max 100 (default 10)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Projects retrieved
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/handler.ProjectPage'
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: List projects
      tags:
      - projects
    post:
      consumes:
      - application/json
      description: Creates a project and automatically makes the caller the owner
        and first member.
      parameters:
      - description: Project payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CreateProjectRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Project created
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.Project'
              type: object
        "400":
          description: Validation error or malformed body
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
