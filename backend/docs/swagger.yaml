        type: integer
    type: object
  model.Project:
    properties:
      created_at:
        type: string
      deadline:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      owner_id:
        type: string
      status:
        $ref: '#/definitions/model.ProjectStatus'
      updated_at:
        type: string
    type: object
  model.ProjectMember:
    properties:
      email:
        type: string
      joined_at:
        type: string
      name:
        type: string
      project_id:
        type: string
      role:
        $ref: '#/definitions/model.ProjectRole'
      user_id:
        type: string
    type: object
  model.ProjectMemberInvite:
    properties:
      role:
        allOf:
        - $ref: '#/definitions/model.ProjectRole'
