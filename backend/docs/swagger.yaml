    - ProjectStatusArchived
  model.ProjectTaskCounts:
    properties:
      done:
        example: 12
        type: integer
      in_progress:
        example: 3
        type: integer
      project_id:
        example: c303012a-6275-4aa3-adec-ebfb123f4567
        type: string
      project_name:
        example: Q4 Roadmap
        type: string
      todo:
        example: 5
        type: integer
      total:
        example: 20
        type: integer
    type: object
  model.RefreshRequest:
    properties:
      refresh_token:
        example: k9F2pQ7sR1tU4vWxYz0AbCdEfGhIjKlMnOpQrStUvWx=
        type: string
    type: object
  model.RegisterRequest:
    properties:
      email:
        example: alice@example.com
        type: string
      name:
        example: Alice
        type: string
      password:
        example: password123
        type: string
    type: object
  model.Task:
    properties:
      assignee_id:
        example: f02c1d9c-1f73-4d3a-9b8c-aab0cf2d12cd
        type: string
      created_at:
        example: "2026-05-20T09:15:00Z"
        type: string
      created_by:
        example: 6b3a0c0e-2cc1-4f3c-8d9c-1a1b2c3d4e5f
        type: string
      description:
        example: Plug JWTProtected into the v1 router
        type: string
      due_date:
        example: "2026-06-01T17:00:00Z"
        type: string
      id:
        example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        type: string
      position:
        example: "00001000"
        type: string
      priority:
        allOf:
        - $ref: '#/definitions/model.TaskPriority'
        example: medium
      project_id:
        example: c303012a-6275-4aa3-adec-ebfb123f4567
        type: string
      status:
        allOf:
        - $ref: '#/definitions/model.TaskStatus'
        example: todo
      title:
        example: Wire up auth middleware
        type: string
      updated_at:
        example: "2026-05-20T09:15:00Z"
        type: string
    type: object
  model.TaskActivityLog:
    properties:
      changed_by:
        example: 6b3a0c0e-2cc1-4f3c-8d9c-1a1b2c3d4e5f
        type: string
      created_at:
        example: "2026-05-20T10:00:00Z"
        type: string
      from_status:
        allOf:
        - $ref: '#/definitions/model.TaskStatus'
        example: todo
      id:
        example: 5b5a7c2c-1d3e-4d3a-9b8c-aab0cf2d99aa
        type: string
      task_id:
        example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        type: string
      to_status:
        allOf:
        - $ref: '#/definitions/model.TaskStatus'
        example: in_progress
    type: object
  model.TaskPriority:
    enum:
    - low
    - medium
    - high
    type: string
    x-enum-varnames:
    - TaskPriorityLow
    - TaskPriorityMedium
    - TaskPriorityHigh
  model.TaskStatus:
    enum:
    - todo
    - in_progress
    - done
    type: string
    x-enum-varnames:
    - TaskStatusTodo
    - TaskStatusInProgress
    - TaskStatusDone
  model.TokenPair:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyX2lkIjoiYzMwMzAxMmEtNjI3NS00YWEzLWFkZWMtZWJmYjEyM2Y0NTY3IiwiZW1haWwiOiJhbGljZUBleGFtcGxlLmNvbSIsImV4cCI6MTczMzc4NzIwMH0.signature
        type: string
      refresh_token:
        example: k9F2pQ7sR1tU4vWxYz0AbCdEfGhIjKlMnOpQrStUvWx=
        type: string
    type: object
  model.UpcomingTask:
    properties:
      due_date:
        example: "2026-05-22T17:00:00Z"
        type: string
      id:
        example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        type: string
      priority:
        allOf:
        - $ref: '#/definitions/model.TaskPriority'
        example: high
      project_id:
        example: c303012a-6275-4aa3-adec-ebfb123f4567
        type: string
      project_name:
        example: Q4 Roadmap
        type: string
      status:
        allOf:
        - $ref: '#/definitions/model.TaskStatus'
        example: in_progress
      title:
        example: Ship release candidate
        type: string
    type: object
  model.UpdateProjectRequest:
    properties:
      deadline:
        example: "2026-12-31T23:59:59Z"
        type: string
      description:
        example: Updated scope for Q4
        type: string
      name:
        example: Q4 Roadmap (revised)
        type: string
      status:
        allOf:
        - $ref: '#/definitions/model.ProjectStatus'
        example: archived
    type: object
  model.UpdateTaskRequest:
    properties:
      assignee_id:
        example: f02c1d9c-1f73-4d3a-9b8c-aab0cf2d12cd
        type: string
      description:
        example: Also cover refresh-token flow
        type: string
      due_date:
        example: "2026-06-05T17:00:00Z"
        type: string
      priority:
        allOf:
        - $ref: '#/definitions/model.TaskPriority'
        example: high
      status:
        allOf:
        - $ref: '#/definitions/model.TaskStatus'
        example: in_progress
      title:
        example: Wire up auth middleware (revised)
        type: string
    type: object
  notifier.Event:
    properties:
      project_id:
        example: c303012a-6275-4aa3-adec-ebfb123f4567
        type: string
      reminder_window:
        example: 3d
        type: string
      task:
        $ref: '#/definitions/model.Task'
      task_id:
        example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        type: string
      timestamp:
        example: "2026-05-20T16:00:00Z"
        type: string
      type:
