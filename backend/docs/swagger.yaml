        - $ref: '#/definitions/notifier.EventType'
        example: task.created
    type: object
  notifier.EventType:
    enum:
    - task.created
    - task.updated
    - task.deleted
    - task.assigned
    - task.moved
    - task.deadline_reminder
    type: string
    x-enum-varnames:
    - EventTaskCreated
    - EventTaskUpdated
    - EventTaskDeleted
    - EventTaskAssigned
    - EventTaskMoved
    - EventTaskDeadlineReminder
  response.Body:
    properties:
      data:
        type: object
      error:
        example: 'validation error: password must be at least 8 characters'
        type: string
      message:
        example: operation successful
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: TaskFlow Maintainers
    url: https://github.com/mnabil1718/taskflow
  description: |-
    Task management REST API with JWT authentication.
    All responses follow the shape { data, message, error }.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: TaskFlow API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns an access/refresh token pair.
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.TokenPair'
              type: object
        "400":
          description: Missing fields or malformed JSON body
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Invalid email or password
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      summary: Log in with email and password
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: |-
        Invalidates the supplied refresh token. Idempotent: returns 200
        even if the token does not exist.
      parameters:
      - description: Refresh token to invalidate
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Logged out successfully
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Missing refresh_token or malformed JSON body
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      summary: Log out the current session
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: |-
        Rotates the refresh token: the supplied token is deleted and a
        new access/refresh pair is issued.
      parameters:
      - description: Current refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Token refreshed
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.TokenPair'
              type: object
        "400":
          description: Missing refresh_token or malformed JSON body
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Invalid or expired refresh token
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      summary: Exchange a refresh token for a new token pair
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: |-
        Creates a new user account and returns an access/refresh token pair.
        Validation rules: name >= 2 chars, valid email, password >= 8 chars.
      parameters:
      - description: Registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Registration successful
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.TokenPair'
              type: object
        "400":
          description: Validation error or malformed JSON body
          schema:
            $ref: '#/definitions/response.Body'
        "409":
          description: Email already registered
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      summary: Register a new user
      tags:
      - auth
  /dashboard/project-task-counts:
    get:
      description: |-
        Returns a count of tasks grouped by status (todo, in_progress, done) for every
        project the caller is a member of, plus the total task count per project.
        Projects with no tasks are still included with zeroed counters.
      produces:
      - application/json
      responses:
        "200":
          description: Project task counts retrieved
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.ProjectTaskCounts'
                  type: array
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Per-project task counts
      tags:
      - dashboard
  /dashboard/upcoming-tasks:
    get:
      description: |-
        Returns tasks assigned to the caller whose due_date falls within the next 3 days
        and whose status is not "done". Ordered by soonest due_date first.
      produces:
      - application/json
      responses:
        "200":
          description: Upcoming tasks retrieved
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.UpcomingTask'
                  type: array
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Upcoming tasks assigned to the caller
      tags:
      - dashboard
  /notifications/stream:
    get:
      description: |-
        Opens a long-lived SSE connection that pushes task events to the
        caller. The set of events the caller receives depends on the event
        type — see "Routing" below.

        Event types:
        - task.created           — a new task was created in a project the caller is a member of
        - task.updated           — a task in such a project was updated
        - task.deleted           — a task in such a project was deleted
        - task.assigned          — a task's assignee was changed (assign or unassign)
        - task.deadline_reminder — the caller is the assignee of an open task whose due_date is approaching

        Routing:
        - task.created / updated / deleted / assigned are fanned out to **every member** of the affected project (team feed).
        - task.deadline_reminder is sent **only to the assignee** of the task.

        Deadline reminders fire in two windows per task: when the deadline
        is within 3 days, and again when it is within 1 day. The
        `reminder_window` field on the event payload is "3d" or "1d"
        accordingly. Each window fires at most once per (task, window) pair;
        changing the task's due_date or assignee resets the windows so the
        new schedule / new assignee gets fresh warnings. Done tasks and
        unassigned tasks never receive reminders.

        Wire format: text/event-stream. Each event arrives as two lines
        followed by a blank line:
        event: <type>
        data:  <json-encoded notifier.Event>

        A `: ping` comment line is sent every 15 seconds to keep the
        connection alive through proxies. Native browser EventSource does
        not support custom headers; clients can either use fetch-based
        streaming or an EventSource polyfill that allows headers.
      produces:
      - text/event-stream
      responses:
        "200":
          description: Schema of the JSON payload carried in each event's `data:`
            line. `reminder_window` is present only on task.deadline_reminder events.
          schema:
            $ref: '#/definitions/notifier.Event'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Stream task notifications (Server-Sent Events)
      tags:
      - notifications
  /projects:
    get:
      description: Returns a paginated list of projects the caller owns or is a member
        of.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page, max 100 (default 10)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Projects retrieved
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/handler.ProjectPage'
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: List projects
      tags:
      - projects
    post:
      consumes:
      - application/json
      description: Creates a project and automatically makes the caller the owner
        and first member.
      parameters:
      - description: Project payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CreateProjectRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Project created
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.Project'
              type: object
        "400":
          description: Validation error or malformed body
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Create a new project
      tags:
      - projects
  /projects/{id}:
    delete:
      description: Permanently deletes a project and all its tasks. Only the owner
        can delete.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Project deleted
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Caller is not the project owner
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Project not found
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Delete a project
      tags:
      - projects
    get:
      description: Returns a single project by ID. Only accessible to project members.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Project retrieved
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.Project'
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Project not found or caller is not a member
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Get a project
      tags:
      - projects
    put:
      consumes:
      - application/json
      description: |-
        Replaces name, description, status, and deadline. Only the owner can update.
        Status must be "active" or "archived".
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      - description: Updated project fields
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.UpdateProjectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Project updated
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.Project'
              type: object
        "400":
          description: Validation error or malformed body
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Caller is not the project owner
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Project not found
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Update a project
      tags:
      - projects
  /projects/{id}/board:
    get:
      description: |-
        Returns all tasks in the project grouped by status, with each column already
        sorted by the Lexorank `position` string. The caller must be a project member.
        Intended for the drag & drop board view — no pagination.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Board retrieved
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.BoardView'
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Project not found or caller is not a member
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Get the Kanban board for a project
      tags:
      - tasks
  /projects/{id}/members:
    get:
      description: Returns all members of the project. Accessible to any project member.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Members retrieved
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.ProjectMember'
                  type: array
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Project not found or caller is not a member
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: List project members
      tags:
      - projects
    post:
      consumes:
      - application/json
      description: |-
        Adds a registered user to the project with the given role. Only the owner can add members.
        Valid roles are "admin" and "member". Defaults to "member" if omitted.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      - description: Member payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.AddMemberRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Member added
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.ProjectMember'
              type: object
        "400":
          description: Validation error — missing user_id or invalid role
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Caller is not the project owner
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Project or user not found
          schema:
            $ref: '#/definitions/response.Body'
        "409":
          description: User is already a member
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Add a member to a project
      tags:
      - projects
  /projects/{id}/members/{userID}:
    delete:
      description: |-
        Removes the specified user from the project. Only the owner can remove members.
        The owner cannot remove themselves.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      - description: UUID of the user to remove
        in: path
        name: userID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Member removed
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Owner cannot remove themselves
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Caller is not the project owner
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Project or member not found
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Remove a member from a project
      tags:
      - projects
  /projects/{id}/tasks:
    get:
      description: |-
        Returns a paginated list of tasks in the project. The caller must be a project member.
        Supports filtering by status, priority, and assignee, and sorting by a whitelisted column.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      - description: 'Filter by status: todo, in_progress, done'
        in: query
        name: status
        type: string
      - description: 'Filter by priority: low, medium, high'
        in: query
        name: priority
        type: string
      - description: Filter by assignee UUID
        in: query
        name: assignee_id
        type: string
      - description: 'Sort column: status, priority, assignee_id, due_date, updated_at,
          title, created_at (default created_at)'
        in: query
        name: sort_by
        type: string
      - description: 'Sort direction: asc or desc (default desc)'
        in: query
        name: sort_order
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page, max 100 (default 10)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Tasks retrieved
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/handler.TaskPage'
              type: object
        "400":
          description: Invalid filter value
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Project not found or caller is not a member
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: List tasks in a project
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: |-
        Creates a task scoped to a project. The caller must be a project member.
        If assignee_id is set, the assignee must also be a project member.
        Priority defaults to "medium" when omitted; status is always "todo" on creation.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      - description: Task payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Task created
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.Task'
              type: object
        "400":
          description: Validation error, invalid priority, or assignee not a project
            member
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Project not found or caller is not a member
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Create a task in a project
      tags:
      - tasks
  /tasks/{taskID}:
    delete:
      description: Permanently deletes a task. Only the project owner or the task
        creator can delete.
      parameters:
      - description: Task UUID
        in: path
        name: taskID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Task deleted
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Caller is not the project owner or task creator
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Task not found or caller is not a project member
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Delete a task
      tags:
      - tasks
    get:
      description: Returns a single task by ID. The caller must be a member of the
        task's project.
      parameters:
      - description: Task UUID
        in: path
        name: taskID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Task retrieved
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.Task'
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Task not found or caller is not a project member
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Get a task
      tags:
      - tasks
    put:
      consumes:
      - application/json
      description: |-
        Replaces title, description, status, priority, assignee, and due_date.
        The caller must be a project member. If assignee_id is set, the assignee must also be a project member.
        A status change is recorded automatically in the task activity log.
      parameters:
      - description: Task UUID
        in: path
        name: taskID
        required: true
        type: string
      - description: Updated task fields
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.UpdateTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Task updated
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.Task'
              type: object
        "400":
          description: Validation error, invalid enum, or assignee not a project member
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Task not found or caller is not a project member
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Update a task
      tags:
      - tasks
  /tasks/{taskID}/activity:
    get:
      description: |-
        Returns the task's status-transition log in reverse chronological order.
        The caller must be a member of the task's project.
      parameters:
      - description: Task UUID
        in: path
        name: taskID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Activity logs retrieved
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.TaskActivityLog'
                  type: array
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Task not found or caller is not a project member
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: List a task's status-change history
      tags:
      - tasks
  /tasks/{taskID}/assign:
    patch:
      consumes:
      - application/json
      description: |-
        Updates only the assignee of a task. The caller must be a project member.
        Set assignee_id to a project member UUID to assign, or to null to unassign.
      parameters:
      - description: Task UUID
        in: path
        name: taskID
        required: true
        type: string
      - description: Assignee payload (null to unassign)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.AssignTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Task assignee updated
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.Task'
              type: object
        "400":
          description: Malformed body or assignee not a project member
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Task not found or caller is not a project member
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Assign or unassign a task
      tags:
      - tasks
  /tasks/{taskID}/move:
    patch:
      consumes:
      - application/json
      description: |-
        Updates a task's status and ordering position in one atomic write.
        The client computes the new `position` string (Lexorank) before calling.
        A status change is recorded in the task activity log; same-column reorders are not.
      parameters:
      - description: Task UUID
        in: path
        name: taskID
        required: true
        type: string
      - description: New status + position
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.MoveTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Task moved
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.Task'
              type: object
        "400":
          description: Malformed body, invalid status, or invalid position
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Task not found or caller is not a project member
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Move a task on the Kanban board
      tags:
      - tasks
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and the JWT access token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
