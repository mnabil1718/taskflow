        type: integer
    type: object
  model.BulkDeleteTasksRequest:
    properties:
      ids:
        items:
          type: string
        type: array
    type: object
  model.BulkDeleteTasksResponse:
    properties:
      deleted_count:
        type: integer
    type: object
  model.BulkTrashRequest:
    properties:
      project_ids:
        items:
          type: string
        type: array
      task_ids:
        items:
          type: string
        type: array
    type: object
  model.BulkTrashResponse:
    properties:
      purged_projects:
        type: integer
      purged_tasks:
        type: integer
      restored_projects:
        type: integer
      restored_tasks:
        type: integer
    type: object
  model.CreateProjectRequest:
    type: object
  model.CreateTaskRequest:
    properties:
      assignee_id:
        example: f02c1d9c-1f73-4d3a-9b8c-aab0cf2d12cd
        type: string
      description:
        example: Plug JWTProtected into the v1 router
        type: string
      due_date:
        example: "2026-06-01T17:00:00Z"
        type: string
      position:
        description: |-
          Optional Lexorank position. Send one only when creating from the Kanban
