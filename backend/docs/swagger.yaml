basePath: /api/v1
definitions:
  handler.ProjectPage:
    properties:
      items: {}
      limit:
        example: 10
        type: integer
      page:
        example: 1
        type: integer
      total:
        example: 42
        type: integer
      total_pages:
        example: 5
        type: integer
    type: object
  handler.TaskPage:
    properties:
      items: {}
      limit:
        example: 10
        type: integer
      page:
        example: 1
        type: integer
      total:
        example: 42
        type: integer
      total_pages:
        example: 5
        type: integer
    type: object
  model.AddMemberRequest:
    properties:
      role:
        allOf:
        - $ref: '#/definitions/model.ProjectRole'
        example: member
      user_id:
        example: c303012a-6275-4aa3-adec-ebfb123f4567
        type: string
    type: object
  model.AssignTaskRequest:
    properties:
      assignee_id:
        example: f02c1d9c-1f73-4d3a-9b8c-aab0cf2d12cd
        type: string
    type: object
  model.BoardView:
    properties:
      done:
        items:
          $ref: '#/definitions/model.Task'
        type: array
      in_progress:
        items:
          $ref: '#/definitions/model.Task'
        type: array
      todo:
