basePath: /api/v1
definitions:
  handler.ProjectPage:
    properties:
      items: {}
      limit:
        example: 10
        type: integer
      page:
        example: 1
        type: integer
      total:
        example: 42
        type: integer
      total_pages:
        example: 5
        type: integer
    type: object
  model.AddMemberRequest:
    properties:
      role:
        allOf:
        - $ref: '#/definitions/model.ProjectRole'
        example: member
      user_id:
        example: c303012a-6275-4aa3-adec-ebfb123f4567
        type: string
    type: object
  model.CreateProjectRequest:
    properties:
      deadline:
        example: "2026-12-31T23:59:59Z"
        type: string
      description:
        example: All tasks for Q4 planning
        type: string
      name:
        example: Q4 Roadmap
        type: string
    type: object
  model.LoginRequest:
    properties:
      email:
        example: alice@example.com
        type: string
      password:
        example: password123
        type: string
    type: object
  model.Project:
    properties:
      created_at:
        type: string
      deadline:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      owner_id:
        type: string
      status:
        $ref: '#/definitions/model.ProjectStatus'
      updated_at:
        type: string
    type: object
  model.ProjectMember:
    properties:
      email:
        type: string
      joined_at:
        type: string
      name:
        type: string
      project_id:
        type: string
      role:
        $ref: '#/definitions/model.ProjectRole'
      user_id:
        type: string
    type: object
  model.ProjectRole:
    enum:
    - owner
    - admin
    - member
    type: string
    x-enum-varnames:
    - ProjectRoleOwner
    - ProjectRoleAdmin
    - ProjectRoleMember
  model.ProjectStatus:
    enum:
    - active
    - archived
    type: string
    x-enum-varnames:
    - ProjectStatusActive
    - ProjectStatusArchived
  model.RefreshRequest:
    properties:
      refresh_token:
        example: k9F2pQ7sR1tU4vWxYz0AbCdEfGhIjKlMnOpQrStUvWx=
        type: string
    type: object
  model.RegisterRequest:
    properties:
      email:
        example: alice@example.com
        type: string
      name:
        example: Alice
        type: string
      password:
        example: password123
        type: string
    type: object
  model.TokenPair:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyX2lkIjoiYzMwMzAxMmEtNjI3NS00YWEzLWFkZWMtZWJmYjEyM2Y0NTY3IiwiZW1haWwiOiJhbGljZUBleGFtcGxlLmNvbSIsImV4cCI6MTczMzc4NzIwMH0.signature
        type: string
      refresh_token:
        example: k9F2pQ7sR1tU4vWxYz0AbCdEfGhIjKlMnOpQrStUvWx=
        type: string
    type: object
  model.UpdateProjectRequest:
    properties:
      deadline:
        example: "2026-12-31T23:59:59Z"
        type: string
      description:
        example: Updated scope for Q4
        type: string
      name:
        example: Q4 Roadmap (revised)
        type: string
      status:
        allOf:
        - $ref: '#/definitions/model.ProjectStatus'
        example: archived
    type: object
  response.Body:
    properties:
      data:
        type: object
      error:
        example: 'validation error: password must be at least 8 characters'
        type: string
      message:
        example: operation successful
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: TaskFlow Maintainers
    url: https://github.com/mnabil1718/taskflow
  description: |-
    Task management REST API with JWT authentication.
    All responses follow the shape { data, message, error }.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: TaskFlow API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns an access/refresh token pair.
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.TokenPair'
              type: object
        "400":
          description: Missing fields or malformed JSON body
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Invalid email or password
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      summary: Log in with email and password
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: |-
        Invalidates the supplied refresh token. Idempotent: returns 200
        even if the token does not exist.
      parameters:
      - description: Refresh token to invalidate
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Logged out successfully
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Missing refresh_token or malformed JSON body
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      summary: Log out the current session
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: |-
        Rotates the refresh token: the supplied token is deleted and a
        new access/refresh pair is issued.
      parameters:
      - description: Current refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Token refreshed
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.TokenPair'
              type: object
        "400":
          description: Missing refresh_token or malformed JSON body
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Invalid or expired refresh token
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      summary: Exchange a refresh token for a new token pair
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: |-
        Creates a new user account and returns an access/refresh token pair.
        Validation rules: name >= 2 chars, valid email, password >= 8 chars.
      parameters:
      - description: Registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Registration successful
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.TokenPair'
              type: object
        "400":
          description: Validation error or malformed JSON body
          schema:
            $ref: '#/definitions/response.Body'
        "409":
          description: Email already registered
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      summary: Register a new user
      tags:
      - auth
  /projects:
    get:
      description: Returns a paginated list of projects the caller owns or is a member
        of.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page, max 100 (default 10)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Projects retrieved
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/handler.ProjectPage'
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: List projects
      tags:
      - projects
    post:
      consumes:
      - application/json
      description: Creates a project and automatically makes the caller the owner
        and first member.
      parameters:
      - description: Project payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CreateProjectRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Project created
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.Project'
              type: object
        "400":
          description: Validation error or malformed body
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Create a new project
      tags:
      - projects
  /projects/{id}:
    delete:
      description: Permanently deletes a project and all its tasks. Only the owner
        can delete.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Project deleted
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Caller is not the project owner
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Project not found
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Delete a project
      tags:
      - projects
    get:
      description: Returns a single project by ID. Only accessible to project members.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Project retrieved
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.Project'
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Project not found or caller is not a member
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Get a project
      tags:
      - projects
    put:
      consumes:
      - application/json
      description: |-
        Replaces name, description, status, and deadline. Only the owner can update.
        Status must be "active" or "archived".
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      - description: Updated project fields
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.UpdateProjectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Project updated
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.Project'
              type: object
        "400":
          description: Validation error or malformed body
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Caller is not the project owner
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Project not found
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Update a project
      tags:
      - projects
  /projects/{id}/members:
    get:
      description: Returns all members of the project. Accessible to any project member.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Members retrieved
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.ProjectMember'
                  type: array
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Project not found or caller is not a member
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: List project members
      tags:
      - projects
    post:
      consumes:
      - application/json
      description: |-
        Adds a registered user to the project with the given role. Only the owner can add members.
        Valid roles are "admin" and "member". Defaults to "member" if omitted.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      - description: Member payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.AddMemberRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Member added
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/model.ProjectMember'
              type: object
        "400":
          description: Validation error — missing user_id or invalid role
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Caller is not the project owner
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Project or user not found
          schema:
            $ref: '#/definitions/response.Body'
        "409":
          description: User is already a member
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Add a member to a project
      tags:
      - projects
  /projects/{id}/members/{userID}:
    delete:
      description: |-
        Removes the specified user from the project. Only the owner can remove members.
        The owner cannot remove themselves.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      - description: UUID of the user to remove
        in: path
        name: userID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Member removed
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Owner cannot remove themselves
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Caller is not the project owner
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Project or member not found
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Remove a member from a project
      tags:
      - projects
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and the JWT access token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
